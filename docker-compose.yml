# =============================================================================
# ComfyUI for DGX Spark — docker-compose
#
# Two services:
#  - comfyui : the main UI + diffusion stack
#  - ollama  : LLM prompt-expansion service used by workflow 09 (AceStep audio).
#              On first boot it auto-pulls `gemma3:4b` (~3 GB) so the workflow
#              works out of the box. Override OLLAMA_PRELOAD_MODEL to swap.
# =============================================================================
services:
  ollama:
    image: ollama/ollama:latest
    container_name: comfyui-ollama
    runtime: nvidia
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    environment:
      OLLAMA_HOST: "0.0.0.0:11434"
      OLLAMA_KEEP_ALIVE: "24h"
      OLLAMA_NUM_PARALLEL: "1"
      NVIDIA_VISIBLE_DEVICES: "all"
      NVIDIA_DRIVER_CAPABILITIES: "compute,utility"
    volumes:
      - ./workspace/.ollama:/root/.ollama
    # Pre-pull the LLM workflow 09 expects on first start.  If the model
    # already exists in the volume it's a no-op.
    entrypoint: >-
      /bin/sh -c '
      /bin/ollama serve &
      sleep 5;
      MODEL="${OLLAMA_PRELOAD_MODEL:-gemma3:4b}";
      echo "[ollama-init] ensuring model $$MODEL is present";
      /bin/ollama pull "$$MODEL" || true;
      echo "[ollama-init] ready";
      wait
      '
    healthcheck:
      test: ["CMD", "/bin/ollama", "list"]
      interval: 30s
      timeout: 10s
      start_period: 120s
      retries: 5
    restart: unless-stopped

  comfyui:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        BUILD_JOBS: "${BUILD_JOBS:-20}"
    image: comfyui-spark:cu130
    container_name: comfyui-spark
    hostname: comfyui-spark

    # GPU access (full unified-memory fabric on DGX Spark)
    runtime: nvidia
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

    # Web UI port (override with COMFYUI_PORT)
    ports:
      - "${COMFYUI_PORT:-8188}:8188"

    environment:
      # ComfyUI flags — optimized for sm_121a with SageAttention + bf16
      COMFYUI_PORT: "8188"
      COMFYUI_FLAGS: >-
        --listen 0.0.0.0
        --port 8188
        --use-sage-attention
        --bf16-unet --bf16-vae --bf16-text-enc
        --disable-pinned-memory
        --reserve-vram 2.0
        --preview-method auto
        --enable-cors-header
        --enable-manager
        --enable-assets

      # Compile path is broken on sm_121a today — keep it off
      TORCH_COMPILE_DISABLE: "1"
      TORCHDYNAMO_DISABLE: "1"

      # Grace-Blackwell unified-memory tuning
      CUDA_DEVICE_MAX_CONNECTIONS: "1"
      CUDA_DEVICE_MAX_COPY_CONNECTIONS: "4"
      CUDA_MODULE_LOADING: "EAGER"
      CUDA_MANAGED_FORCE_DEVICE_ALLOC: "1"
      CUBLAS_WORKSPACE_CONFIG: ":0:0"
      PYTORCH_ALLOC_CONF: "expandable_segments:True"
      OMP_NUM_THREADS: "20"
      MKL_NUM_THREADS: "20"

      # NVIDIA toolkit
      NVIDIA_VISIBLE_DEVICES: "all"
      NVIDIA_DRIVER_CAPABILITIES: "compute,utility,video"

      # HuggingFace download tuning
      HF_HUB_ENABLE_HF_TRANSFER: "1"
      HF_HUB_DOWNLOAD_TIMEOUT: "180"
      HF_TOKEN: "${HF_TOKEN:-}"

      # Toggle the auto-download flow on first start
      SKIP_MODEL_DOWNLOAD: "${SKIP_MODEL_DOWNLOAD:-0}"
      SKIP_ABLITERATED: "${SKIP_ABLITERATED:-0}"
      FORCE_MODEL_DOWNLOAD: "${FORCE_MODEL_DOWNLOAD:-0}"

    # Single persistent volume for the entire ComfyUI workspace.
    # This is the local source of truth — models, custom_nodes, output, input,
    # user (settings + workflows), temp all live here so nothing is lost on
    # container rebuild/recreate.
    volumes:
      - ./workspace:/workspace/ComfyUI

    shm_size: "32gb"
    ipc: host
    ulimits:
      memlock: -1
      stack: 67108864

    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8188/system_stats >/dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      start_period: 600s
      retries: 5

    depends_on:
      ollama:
        condition: service_healthy

    restart: unless-stopped
